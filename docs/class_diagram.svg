<text x="76" y="580" class="field">+ user: ForeignKey</text>
<text x="76" y="602" class="field">+ path: CharField</text>
<text x="76" y="624" class="field">+ ip: CharField</text>
<text x="76" y="646" class="field">+ user_agent: TextField</text>
<text x="76" y="668" class="field">+ created_at: DateTimeField</text>
<text x="76" y="690" class="field">+ __str__()</text>
</g>
<g class="class-box" id="Category">
