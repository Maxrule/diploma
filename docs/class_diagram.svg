<text x="1196" y="770" class="field">+ listing: ForeignKey</text>
<text x="1196" y="792" class="field">+ sender: ForeignKey</text>
<text x="1196" y="814" class="field">+ receiver: ForeignKey</text>
<text x="1196" y="836" class="field">+ content: TextField</text>
