<text x="446" y="847" class="field">+ promoted_until: DateTimeField</text>
<text x="446" y="869" class="field">+ is_promoted: property</text>
<text x="446" y="891" class="field">+ __str__()</text>
</g>
<g class="class-box" id="Image">
