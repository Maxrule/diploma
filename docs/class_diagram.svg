<text x="821" y="265" class="field">+ rating: IntegerField</text>
<text x="821" y="287" class="field">+ comment: TextField</text>
<text x="821" y="309" class="field">+ user: ForeignKey</text>
<text x="821" y="331" class="field">+ listing: ForeignKey</text>
<text x="821" y="353" class="field">+ created_at: DateTimeField</text>
<text x="821" y="375" class="field">+ __str__()</text>
</g>
<g class="class-box" id="Favorite">
