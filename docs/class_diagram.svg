<text x="446" y="605" class="field">+ user: ForeignKey</text>
<text x="446" y="627" class="field">+ category: ForeignKey</text>
<text x="446" y="649" class="field">+ location: ForeignKey</text>
<text x="446" y="671" class="field">+ name: CharField</text>
<text x="446" y="693" class="field">+ email: EmailField</text>
<text x="446" y="715" class="field">+ phone: CharField</text>
<text x="446" y="737" class="field">+ is_active: BooleanField</text>
