<text x="446" y="295" class="field">+ city: CharField</text>
<text x="446" y="317" class="field">+ latitude: FloatField</text>
<text x="446" y="339" class="field">+ longitude: FloatField</text>
<text x="446" y="361" class="field">+ __str__()</text>
</g>
