<text x="1196" y="455" class="field">+ original_order_id: PositiveIntegerField</text>
<text x="1196" y="477" class="field">+ user: ForeignKey</text>
<text x="1196" y="499" class="field">+ listing: ForeignKey</text>
<text x="1196" y="521" class="field">+ city: CharField</text>
<text x="1196" y="543" class="field">+ delivery_price: PositiveIntegerField</text>
<text x="1196" y="565" class="field">+ final_price: PositiveIntegerField</text>
<text x="1196" y="587" class="field">+ paid: BooleanField</text>
<text x="1196" y="609" class="field">+ order_created_at: DateTimeField</text>
<text x="1196" y="631" class="field">+ canceled_at: DateTimeField</text>
<text x="1196" y="653" class="field">+ __str__()</text>
</g>
<g class="class-box" id="Message">
