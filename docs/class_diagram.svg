  <g class="class-box" id="AbstractUser">
<rect x="60" y="60" width="285" height="90" rx="8"/>
<rect class="class-title-bg" x="60" y="60" width="285" height="42" rx="8"/>
<line x1="60" y1="102" x2="345" y2="102"/>
<text x="202.5" y="87" class="title">AbstractUser</text>
<text x="76" y="120" class="field">&lt;&lt;Django&gt;&gt;</text>
</g>
<g class="class-box" id="CustomUser">
<rect x="60" y="220" width="285" height="222" rx="8"/>
<rect class="class-title-bg" x="60" y="220" width="285" height="42" rx="8"/>
<line x1="60" y1="262" x2="345" y2="262"/>
<text x="202.5" y="247" class="title">CustomUser</text>
<text x="76" y="280" class="field">+ full_name: CharField</text>
<text x="76" y="302" class="field">+ phone: CharField</text>
<text x="76" y="324" class="field">+ role: CharField</text>
<text x="76" y="346" class="field">+ email_verified: BooleanField</text>
<text x="76" y="368" class="field">+ verification_code: CharField</text>
<text x="76" y="390" class="field">+ verification_code_expires_at: DateTimeField</text>
<text x="76" y="412" class="field">+ effective_role: property</text>
</g>
<g class="class-box" id="Visit">
