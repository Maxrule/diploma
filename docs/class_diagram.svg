<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1540" height="990" viewBox="0 0 1540 990">
  <defs>
    <marker id="association" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#40536b"/>
    </marker>
    <marker id="inheritance" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#ffffff" stroke="#2f3d4d" stroke-width="1.5"/>
    </marker>
    <style>
      svg {
        background: #f6f8fb;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      .class-box rect {
        fill: #ffffff;
        stroke: #2f3d4d;
        stroke-width: 1.4;
      }
      .class-title-bg {
        fill: #e8eef6 !important;
      }
      .class-box line {
        stroke: #2f3d4d;
        stroke-width: 1.2;
      }
      .title {
        fill: #182536;
        font-size: 17px;
        font-weight: 700;
        text-anchor: middle;
      }
      .field {
        fill: #24364a;
        font-size: 13px;
      }
      .association-line {
        fill: none;
        stroke: #40536b;
        stroke-width: 1.4;
      }
      .inheritance-line {
        fill: none;
        stroke: #2f3d4d;
        stroke-width: 1.8;
      }
      .relation-label {
        fill: #5d6f84;
        font-size: 12px;
        text-anchor: middle;
        paint-order: stroke;
        stroke: #f6f8fb;
        stroke-width: 5px;
      }
      .cardinality {
        fill: #304258;
        font-size: 12px;
        font-weight: 600;
        paint-order: stroke;
        stroke: #f6f8fb;
        stroke-width: 5px;
        text-anchor: middle;
      }
    </style>
  </defs>
  <text x="60" y="34" style="font-size: 22px; font-weight: 700; fill: #182536;">Class Diagram: Django Classifieds Project</text>
  <g class="relation">
<polyline class="inheritance-line" points="202,220 202,150" marker-end="url(#inheritance)"/>
<text x="202" y="177" class="relation-label">extends</text>
</g>
<g class="relation">
<polyline class="association-line" points="202,442 202,520" marker-end="url(#association)"/>
<text x="202" y="473" class="relation-label">visits</text><text x="216" y="434" class="cardinality">1</text><text x="216" y="536" class="cardinality">0..*</text>
</g>
<g class="relation">
