<text x="1196" y="252" class="field">+ payment_reference: CharField</text>
<text x="1196" y="274" class="field">+ created_at: DateTimeField</text>
<text x="1196" y="296" class="field">+ paid: BooleanField</text>
<text x="1196" y="318" class="field">+ __str__()</text>
</g>
