<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Вхід</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../static/styles.css">
  <style>
    body {
      background-color: #f0f2f5;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .auth-page {
      width: 100%;
      max-width: 420px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
      box-sizing: border-box;
    }

    .auth-page h2 {
      margin-bottom: 20px;
      color: #333;
    }

    form {
      background-color: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
    }

    input[type="text"],
    input[type="password"] {
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #4a90e2;
      outline: none;
    }

    form button {
      padding: 12px;
      background-color: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    form button:hover {
      background-color: #357ab8;
    }

    #login-error {
      color: red;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <h2>Вхід</h2>
    <form id="login-form">
      <input type="text" id="login-username" placeholder="Ім'я користувача" required><br>
      <input type="password" id="login-password" placeholder="Пароль" required><br>
      <button type="submit">Увійти</button>
    </form>
    <p id="login-error" style="color:red;"></p>
  </div>
  <script>
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();

    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;

    try {
      const res = await fetch('http://127.0.0.1:8000/api/auth/token/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok) {
        // Зберігаємо токен у localStorage
        localStorage.setItem('accessToken', data.access);
        // Можеш додати userId, якщо потрібен для фронтенду
        localStorage.setItem('userId', data.user_id);
        console.log("Current user ID:", data.user_id);

        window.location.href = 'profile.html'; // або index.html
      } else {
        document.getElementById('login-error').textContent = data.detail || 'Невірні дані';
      }
    } catch (err) {
      console.error(err);
      document.getElementById('login-error').textContent = 'Сервер недоступний';
    }
  });
  </script>
  <script src="../static/consent-analytics.js"></script>

</body>
</html>
