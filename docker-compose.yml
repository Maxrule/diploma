services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-diploma}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: gunicorn classifieds_project.wsgi:application --bind 0.0.0.0:8000 --workers 3
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      USE_REDIS_CHANNEL_LAYER: "true"
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media

  websocket:
    build: .
    command: daphne -b 0.0.0.0 -p 8001 classifieds_project.asgi:application
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      USE_REDIS_CHANNEL_LAYER: "true"
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  celery:
    build: .
    command: celery -A classifieds_project worker -l info
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      USE_REDIS_CHANNEL_LAYER: "true"
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - web
      - websocket

volumes:
  postgres_data:
  static_data:
  media_data:
